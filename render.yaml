services:
  - type: web
    name: upaci-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_MAX_CONNECTIONS
        value: "10"
      - key: REDIS_URL
        sync: false
      - key: REDIS_TOKEN
        sync: false
      - key: REDIS_TLS
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "15m"
      - key: FRONTEND_URL
        sync: false
      - key: METRICS_ENABLED
        value: "true"
      - key: METRICS_AUTH_USER
        sync: false
      - key: METRICS_AUTH_PASS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
    healthCheckPath: /api/health
    autoDeploy: true
