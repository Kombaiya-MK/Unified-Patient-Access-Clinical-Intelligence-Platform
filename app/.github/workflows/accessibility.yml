name: Accessibility - Contrast Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/src/**'
      - 'app/tests/a11y/**'
      - 'app/.pa11yci.json'
  push:
    branches: [main]
    paths:
      - 'app/src/**'

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contrast-validation:
    name: WCAG AA Contrast Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Start preview server
        run: npx vite preview --port 5173 &
        env:
          CI: true

      - name: Wait for server
        run: npx wait-on http://localhost:5173 --timeout 30000 || true

      - name: Run Playwright contrast tests
        id: playwright
        run: npx playwright test tests/a11y/ --project=chromium --reporter=json --output=test-results/a11y/
        continue-on-error: true
        env:
          CI: true

      - name: Generate contrast report
        if: always()
        run: node scripts/contrast-report.js || true

      - name: Upload contrast report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contrast-report
          path: |
            app/test-results/a11y/contrast-report.html
            app/test-results/a11y/contrast-report.md
            app/test-results/a11y/contrast-report.json
          retention-days: 30

      - name: Comment PR with violations
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'app/test-results/a11y/contrast-report.md';
            let body = '## ❌ Contrast Validation Failed\n\nSee attached artifact for full report.';
            if (fs.existsSync(reportPath)) {
              body = fs.readFileSync(reportPath, 'utf-8');
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.substring(0, 65000),
            });

      - name: Fail if violations detected
        if: steps.playwright.outcome == 'failure'
        run: |
          echo "::error::WCAG AA contrast violations detected. See contrast report artifact for details."
          exit 1
