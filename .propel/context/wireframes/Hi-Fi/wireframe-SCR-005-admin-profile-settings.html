<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCR-005 Profile & Settings (Admin) — Unified Patient Access Platform</title>
  <!-- SCR-005 | Derived From: UC-001 | Personas: Admin | Priority: P1 -->
  <!-- UXR Mapped: UXR-001, UXR-101, UXR-103, UXR-201, UXR-301, UXR-501 -->
  <style>
    :root {
      --primary-900: #003D7A; --primary-800: #004C99; --primary-600: #0066CC;
      --primary-200: #CCE0F5; --primary-100: #E6F0FA;
      --secondary-600: #00A86B; --secondary-100: #E6F6F0;
      --success-600: #00A145; --success-100: #E6F9EF;
      --error-600: #DC3545; --error-100: #FCE8EA;
      --neutral-900: #1A1A1A; --neutral-800: #333333; --neutral-700: #4D4D4D;
      --neutral-600: #666666; --neutral-500: #808080; --neutral-400: #999999;
      --neutral-300: #CCCCCC; --neutral-200: #E5E5E5; --neutral-100: #F5F5F5; --neutral-50: #FAFAFA;
      --bg-primary: #FFFFFF; --bg-tertiary: #FAFAFA;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-full: 9999px;
      --shadow-1: 0px 1px 3px rgba(0,0,0,0.12), 0px 1px 2px rgba(0,0,0,0.24);
      --focus-ring: 0 0 0 2px #FFFFFF, 0 0 0 4px #0066CC;
      --transition: 200ms ease;
      --sidebar-width: 240px; --header-height: 64px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); background: var(--bg-tertiary); color: var(--neutral-900); }
    a { color: var(--primary-600); text-decoration: none; }
    a:hover { color: var(--primary-800); }
    a:focus-visible { outline: none; box-shadow: var(--focus-ring); border-radius: var(--radius-sm); }

    .header { position: fixed; top: 0; left: 0; right: 0; height: var(--header-height); z-index: 1000; background: var(--bg-primary); border-bottom: 1px solid var(--neutral-200); display: flex; align-items: center; padding: 0 24px; gap: 16px; }
    .header__logo { font-size: 20px; font-weight: 700; color: var(--primary-600); }
    .header__title { flex: 1; font-size: 16px; font-weight: 600; color: var(--neutral-800); margin-left: 16px; }
    .header__avatar { width: 36px; height: 36px; border-radius: var(--radius-full); background: var(--error-100); color: var(--error-600); font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    .sidebar { position: fixed; top: var(--header-height); left: 0; bottom: 0; width: var(--sidebar-width); background: var(--bg-primary); border-right: 1px solid var(--neutral-200); padding: 16px 0; z-index: 900; display: flex; flex-direction: column; }
    .sidebar__role { padding: 8px 16px; margin: 0 16px 16px; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--error-600); background: var(--error-100); border-radius: var(--radius-full); text-align: center; }
    .sidebar__nav { flex: 1; list-style: none; }
    .sidebar__item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; font-size: 14px; font-weight: 500; color: var(--neutral-700); cursor: pointer; transition: all var(--transition); border-left: 3px solid transparent; text-decoration: none; }
    .sidebar__item:hover { background: var(--neutral-50); color: var(--primary-600); }
    .sidebar__item--active { color: var(--primary-600); background: var(--primary-100); border-left-color: var(--primary-600); font-weight: 600; }
    .sidebar__item:focus-visible { box-shadow: var(--focus-ring); outline: none; }
    .sidebar__icon { width: 20px; text-align: center; font-size: 16px; }

    .main { margin-left: var(--sidebar-width); margin-top: var(--header-height); padding: 32px; min-height: calc(100vh - var(--header-height)); }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--neutral-500); margin-bottom: 24px; }
    .breadcrumb a { color: var(--primary-600); }
    .breadcrumb__separator { color: var(--neutral-400); }
    .page-title { font-size: 32px; font-weight: 700; line-height: 40px; letter-spacing: -0.25px; margin-bottom: 32px; }

    .profile-layout { display: grid; grid-template-columns: 280px 1fr; gap: 32px; }
    .profile-sidebar { text-align: center; }
    .avatar-large { width: 96px; height: 96px; border-radius: var(--radius-full); background: var(--error-100); color: var(--error-600); font-size: 32px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
    .profile-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .profile-email { font-size: 14px; color: var(--neutral-600); margin-bottom: 16px; }
    .profile-role { display: inline-block; padding: 4px 12px; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; border-radius: var(--radius-full); background: var(--error-100); color: var(--error-600); }

    .card { background: var(--bg-primary); border-radius: var(--radius-md); box-shadow: var(--shadow-1); overflow: hidden; }
    .card__header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--neutral-200); }
    .card__title { font-size: 18px; font-weight: 600; }
    .card__body { padding: 24px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-label { display: block; font-size: 14px; font-weight: 500; color: var(--neutral-800); margin-bottom: 4px; }
    .form-input { width: 100%; height: 40px; padding: 8px 12px; font-size: 16px; font-family: var(--font-family); color: var(--neutral-900); border: 1px solid var(--neutral-300); border-radius: var(--radius-md); background: var(--bg-primary); transition: border-color var(--transition), box-shadow var(--transition); }
    .form-input::placeholder { color: var(--neutral-500); }
    .form-input:hover { border-color: var(--neutral-400); }
    .form-input:focus { border-color: var(--primary-600); box-shadow: 0 0 0 2px var(--primary-100); outline: none; }
    .form-input:disabled { background: var(--neutral-100); color: var(--neutral-400); cursor: not-allowed; }

    .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--neutral-200); }
    .btn { display: inline-flex; align-items: center; justify-content: center; height: 40px; min-width: 80px; padding: 8px 16px; font-size: 14px; font-weight: 500; font-family: var(--font-family); border: none; border-radius: var(--radius-md); cursor: pointer; transition: all var(--transition); }
    .btn:focus-visible { box-shadow: var(--focus-ring); outline: none; }
    .btn--primary { background: var(--primary-600); color: white; }
    .btn--primary:hover { background: var(--primary-800); }
    .btn--secondary { background: none; color: var(--neutral-700); border: 1px solid var(--neutral-300); }
    .btn--secondary:hover { background: var(--neutral-50); border-color: var(--neutral-400); }

    @media (max-width: 1023px) { .sidebar { display: none; } .main { margin-left: 0; } .profile-layout { grid-template-columns: 1fr; } }
    @media (max-width: 767px) { .main { padding: 16px; } .form-grid { grid-template-columns: 1fr; } .page-title { font-size: 24px; } .form-actions { flex-direction: column; } .btn { width: 100%; } }
  </style>
</head>
<body>
  <!-- Navigation Map
    Element: Breadcrumb Dashboard | Action: Navigate back | Target: SCR-004
    Element: Save Button | Action: Save profile | Target: SCR-005-admin (success toast)
    Element: Cancel Button | Action: Navigate back | Target: SCR-004
  -->

  <header class="header" role="banner">
    <div class="header__logo">UPACI</div>
    <div class="header__title">Profile &amp; Settings</div>
    <div class="header__avatar" role="button" aria-label="User menu" tabindex="0">AD</div>
  </header>

  <nav class="sidebar" role="navigation" aria-label="Main navigation">
    <div class="sidebar__role">Admin</div>
    <ul class="sidebar__nav">
      <li><a href="wireframe-SCR-004-admin-dashboard.html" class="sidebar__item"><span class="sidebar__icon">🏠</span> Dashboard</a></li>
      <li><a href="wireframe-SCR-013-user-management.html" class="sidebar__item"><span class="sidebar__icon">👥</span> User Management</a></li>
      <li><a href="wireframe-SCR-014-department-management.html" class="sidebar__item"><span class="sidebar__icon">🏢</span> Departments</a></li>
      <li><a href="wireframe-SCR-012-audit-logs.html" class="sidebar__item"><span class="sidebar__icon">🛡️</span> Audit Logs</a></li>
      <li><a href="wireframe-SCR-005-admin-profile-settings.html" class="sidebar__item sidebar__item--active"><span class="sidebar__icon">👤</span> Profile &amp; Settings</a></li>
    </ul>
  </nav>

  <main class="main" role="main">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="wireframe-SCR-004-admin-dashboard.html">Dashboard</a>
      <span class="breadcrumb__separator" aria-hidden="true">›</span>
      <span aria-current="page">Profile &amp; Settings</span>
    </nav>

    <h1 class="page-title">Profile &amp; Settings</h1>

    <div class="profile-layout">
      <div class="profile-sidebar">
        <div class="avatar-large" aria-label="User avatar">AD</div>
        <div class="profile-name">System Admin</div>
        <div class="profile-email">admin@clinic.com</div>
        <div style="font-size: 13px; font-weight: 600; color: var(--error-600); background: var(--error-100); display: inline-block; padding: 2px 10px; border-radius: 9999px; margin-bottom: 4px;">ADM-3002</div>
        <div class="profile-role">Admin</div>
      </div>

      <div>
        <div class="card" style="margin-bottom: 24px;">
          <div class="card__header">
            <h2 class="card__title">Personal Information</h2>
          </div>
          <div class="card__body">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="first-name">First Name</label>
                <input class="form-input" type="text" id="first-name" value="System" aria-required="true">
              </div>
              <div class="form-group">
                <label class="form-label" for="last-name">Last Name</label>
                <input class="form-input" type="text" id="last-name" value="Admin" aria-required="true">
              </div>
              <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-input" type="email" id="email" value="admin@clinic.com" disabled>
              </div>
              <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <input class="form-input" type="tel" id="phone" value="+1 (555) 900-0001">
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn--secondary" type="button">Cancel</button>
              <button class="btn btn--primary" type="submit">Save Changes</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card__header">
            <h2 class="card__title">Security</h2>
          </div>
          <div class="card__body">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="current-password">Current Password</label>
                <input class="form-input" type="password" id="current-password" placeholder="Enter current password">
              </div>
              <div class="form-group">
                <label class="form-label" for="new-password">New Password</label>
                <input class="form-input" type="password" id="new-password" placeholder="Enter new password">
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn--secondary" type="button">Cancel</button>
              <button class="btn btn--primary" type="submit">Update Password</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
