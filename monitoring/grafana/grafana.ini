# Grafana Configuration File
# Documentation: https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/

##################### Grafana Server Configuration #####################
[server]
# Protocol (http, https, h2, socket)
protocol = http

# The http port to use
http_port = 3000

# The public facing domain name used to access grafana from a browser
domain = localhost

# The full public facing url
root_url = %(protocol)s://%(domain)s:%(http_port)s/

# Serve Grafana from subpath specified in `root_url` setting
serve_from_sub_path = false

# Log web requests
router_logging = false

# Enable gzip
enable_gzip = true

##################### Database Configuration #####################
[database]
# Database type: mysql, postgres, or sqlite3
type = sqlite3

# For "sqlite3" only, path relative to data_path setting
path = grafana.db

# Max idle connections in the connection pool
max_idle_conn = 2

# Max open connections in the connection pool
max_open_conn = 0

# Connection max lifetime in seconds
conn_max_lifetime = 14400

##################### Security Configuration #####################
[security]
# Disable creation of admin user on first start of grafana
disable_initial_admin_creation = false

# Default admin user
admin_user = admin

# Default admin password
admin_password = admin

# Used for signing cookies
secret_key = SW2YcwTIb9zpOOhoPsMm

# Disable gravatar profile images
disable_gravatar = false

# Data source proxy whitelist (ip_or_domain:port separated by spaces)
data_source_proxy_whitelist =

# Disable protection against brute force login attempts
disable_brute_force_login_protection = false

# Cookie SameSite attribute: lax, strict, none, or disabled
cookie_samesite = lax

# Cookie Secure attribute
cookie_secure = false

##################### Snapshots Configuration #####################
[snapshots]
# Snapshot sharing options
external_enabled = true
external_snapshot_url = https://snapshots-origin.raintank.io
external_snapshot_name = Publish to snapshot.raintank.io

# Remove expired snapshot
snapshot_remove_expired = true

##################### Dashboards Configuration #####################
[dashboards]
# Number dashboard versions to keep
versions_to_keep = 20

# Minimum dashboard refresh interval
min_refresh_interval = 5s

# Default home dashboard path
default_home_dashboard_path =

##################### Users Configuration #####################
[users]
# Disable user signup / registration
allow_sign_up = false

# Allow non admin users to create organizations
allow_org_create = false

# Set to true to automatically assign new users to the default organization (id 1)
auto_assign_org = true

# Set this value to automatically add new users to the provided organization (if auto_assign_org above is set to true)
auto_assign_org_id = 1

# Default role new users will be automatically assigned (viewer, editor, admin)
auto_assign_org_role = Viewer

# Require email validation before sign up completes
verify_email_enabled = false

# Background text for the user field on the login page
login_hint = email or username
password_hint = password

# Default UI theme ("dark" or "light")
default_theme = dark

# Path to a custom home page. Users are only redirected to this if the default home dashboard is used
home_page =

##################### Authentication Configuration #####################
[auth]
# Login cookie name
login_cookie_name = grafana_session

# The maximum lifetime (duration) an authenticated user can be inactive before being required to login again
login_maximum_inactive_lifetime_duration =

# The maximum lifetime (duration) an authenticated user can be logged in before being required to login again
login_maximum_lifetime_duration =

# How often should auth tokens be rotated for authenticated users
token_rotation_interval_minutes = 10

# Disable login form
disable_login_form = false

# Disable signout menu
disable_signout_menu = false

# URL to redirect the user to after sign out
signout_redirect_url =

# Session life time in days
oauth_auto_login = false

##################### Anonymous Authentication #####################
[auth.anonymous]
# Enable anonymous access
enabled = false

# Organization name that should be used for unauthenticated users
org_name = Main Org.

# Role for unauthenticated users, other valid values are `Editor` and `Admin`
org_role = Viewer

# Hide version info
hide_version = false

##################### SMTP Email Configuration #####################
[smtp]
enabled = false
host = localhost:25
user =
password =
cert_file =
key_file =
skip_verify = false
from_address = admin@grafana.localhost
from_name = Grafana
ehlo_identity =
startTLS_policy =

[emails]
welcome_email_on_sign_up = false
templates_pattern = emails/*.html, emails/*.txt

##################### Logging Configuration #####################
[log]
# Either "console", "file", "syslog"
mode = console

# Either "debug", "info", "warn", "error", "critical"
level = info

# Optional settings to set different levels for specific loggers
filters =

# For "console" mode only
[log.console]
level =
format = console

##################### Metrics Configuration #####################
[metrics]
# Enable metrics
enabled = true

# Disable total stats (stat_totals_*) metrics to be generated
disable_total_stats = false

# Metrics environment info adds dimensions to the `grafana_info` metric
[metrics.environment_info]
# exampleLabel1 = exampleValue1
# exampleLabel2 = exampleValue2

# Send internal Grafana metrics to graphite
[metrics.graphite]
# Enable by setting the address setting (ex localhost:2003)
address =
prefix = prod.grafana.%(instance_name)s.

##################### Alerting Configuration #####################
[alerting]
# Disable legacy alerting engine (using unified alerting instead)
enabled = false

# Makes it possible to turn off alert execution but alerting UI is visible
execute_alerts = true

# Default setting for alert error or timeout status
error_or_timeout = alerting

# Default setting for how Grafana handles nodata or null values in alerting
nodata_or_nullvalues = no_data

# Alert notifications can include images, but rendering many images at the same time can overload the server
concurrent_render_limit = 5

# Default setting for alert calculation timeout
evaluation_timeout_seconds = 30

# Default setting for alert notification timeout
notification_timeout_seconds = 30

# Default setting for max attempts to sending alert notifications
max_attempts = 3

# Makes it possible to enforce a minimal interval between evaluations
min_interval_seconds = 1

# Configures for how long alert annotations are stored
max_annotation_age =

# Configures max number of alert annotations that Grafana stores
max_annotations_to_keep =

##################### Explore Configuration #####################
[explore]
# Enable the Explore section
enabled = true

##################### Panels Configuration #####################
[panels]
# If set to true Grafana will allow script tags in text panels
disable_sanitize_html = false

##################### Plugins Configuration #####################
[plugins]
enable_alpha = false
app_tls_skip_verify_insecure = false

# Path to where grafana can store temp files, sessions, and the sqlite3 db (if that is used)
[paths]
data = data
logs = data/log
plugins = data/plugins
provisioning = conf/provisioning

##################### Unified Alerting Configuration #####################
[unified_alerting]
# Enable the Unified Alerting sub-system
enabled = true

# Comma-separated list of organization IDs for which to disable unified alerting
disabled_orgs =

# Admin configuration API methods
admin_config_poll_interval = 60s

# Alertmanager configurations polling interval
alertmanager_config_poll_interval = 60s

# Alert rule evaluation and max annotation length
max_rule_evaluation_concurrency = 10
max_rule_title_length = 190
max_rule_label_length = 100

[unified_alerting.screenshots]
# Enables screenshots in notifications
capture = false

[unified_alerting.reserved_labels]
# Comma-separated list of reserved labels
disabled_labels =
