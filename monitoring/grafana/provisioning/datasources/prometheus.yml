apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      queryTimeout: 60s
      defaultTimezone: browser
      # Custom query parameters
      customQueryParameters: ''
      manageAlerts: true
    editable: true
    version: 1
    uid: prometheus-datasource
